[workspace]
authors = ["Martin Fleischmann <martin@martinfleischmann.net>"]
channels = ["https://prefix.dev/conda-forge"]
name = "pytorch"
platforms = ["linux-64"]

[system-requirements]
cuda = "12.4"

[dependencies]
pytorch-gpu = "*"
ipython = "*"
geopandas = ">=1.1.3,<2"
pyarrow = ">=23.0.1,<24"
seaborn = ">=0.13.2,<0.14"
pre-commit = ">=4.5.1,<5"
ruff = ">=0.15.8,<0.16"
jupyterlab = ">=4.5.6,<5"
pysal = ">=26.1,<27"
clustergram = ">=0.8.1,<0.9"
umap-learn = ">=0.5.12,<0.6"
plotly = ">=6.6.0,<7"
keplergl = ">=0.3.2,<0.4"
openai = ">=2.31.0,<3"
